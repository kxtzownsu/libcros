name: tlcl_examples

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [tlcl_clear, tlcl_define_and_undefine, tlcl_kernver, tlcl_read, tlcl_read_with_offset, tlcl_write]
        tpm_version: [tpm1_2, tpm2_0]

    steps:
    - uses: actions/checkout@v4

    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y swtpm tmux

    - name: start tpm simulator
      run: |
        TPM_LOG="$RUNNER_TEMP/tpm-${{ matrix.tpm_version }}.log"
        if [[ "${{ matrix.tpm_version }}" == "tpm1_2" ]]; then
          tmux new-session -d -s tpm-sim "bash \"$GITHUB_WORKSPACE/scripts/start_tpm1.sh\" > \"$TPM_LOG\" 2>&1"
        else
          tmux new-session -d -s tpm-sim "bash \"$GITHUB_WORKSPACE/scripts/start_tpm2.sh\" > \"$TPM_LOG\" 2>&1"
        fi

        for _ in $(seq 1 30); do
          if compgen -G '/dev/tpm*' > /dev/null; then
            break
          fi
          sleep 1
        done

        if ! compgen -G '/dev/tpm*' > /dev/null; then
          echo "no tpm dev found after waiting"
          echo "--| START TPM LOG |--"
          cat "$TPM_LOG"
          echo "--| END   TPM LOG |--"
          exit 1
        fi

    - name: run example
      run: |
        TPM_DEV=$(ls /dev/tpm* 2>/dev/null | sort -V | tail -n 1)
        if [[ -z "$TPM_DEV" ]]; then
          echo "no tpm found in /dev."
          tmux capture-pane -pt tpm-sim || true
          exit 1
        fi
        
        echo "tpm dev: $TPM_DEV"
                
        TPM_PATH="$TPM_DEV" cargo build --example ${{ matrix.example }} \
          --features tlcl \
          --features ${{ matrix.tpm_version }}

        ./target/debug/examples/${{ matrix.example }} --tpm-path "$TPM_DEV" --verbose
