name: logger

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: run example
      run: | 
          cargo build --example ${{ github.workflow }} --features "example"
          ./target/debug/examples/${{ github.workflow }} --rc=0
          ./target/debug/examples/${{ github.workflow }} --rc=0 --verbose